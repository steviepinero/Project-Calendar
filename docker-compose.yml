# MSP Project Calendar - Docker Compose for Ubuntu server
# Usage: copy .env from env.example, then: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "8000"
      DB_HOST: db
      DB_PORT: "5432"

volumes:
  postgres_data:
